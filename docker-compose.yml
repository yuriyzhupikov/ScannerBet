services:
  migrate:
    build: .
    command: npm run prisma:migrate:deploy
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    command: npm run start:prod
    env_file: ${APP_ENV_FILE:-.env}
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: npm run start:worker
    env_file: ${APP_ENV_FILE:-.env}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mdds
      POSTGRES_USER: mdds
      POSTGRES_PASSWORD: mdds_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdds -d mdds"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
